name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Unit / FakeLogosBridge path — no LOGOS install. logos-bridge *-integration
  # tests self-skip here; the ontology-lint job is the sole real-engine gate.
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto-architect
    steps:
      - uses: actions/checkout@v4
        with:
          path: auto-architect

      # @auto/logos-bridge is a file: re-export of @seam/logos-bridge
      - uses: actions/checkout@v4
        with:
          repository: cyborgbear33/software-architect
          path: software-architect

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: auto-architect/pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint (biome)
        run: pnpm lint

      - name: Test (TS packages/apps)
        run: pnpm -r test

      - name: Build web UI
        run: pnpm --filter @auto/web-ui build

      - name: Install obd-gateway (Python) deps
        run: python -m pip install -r apps/obd-gateway/requirements-dev.txt

      - name: Lint obd-gateway (Ruff)
        run: |
          cd apps/obd-gateway
          python -m ruff check .
          python -m ruff format --check .

      - name: Test obd-gateway (Python)
        run: python -m pytest apps/obd-gateway

  # Real LOGOS: well-formedness + narrow parity + logos-bridge integration smoke.
  ontology-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto-architect
    steps:
      - uses: actions/checkout@v4
        with:
          path: auto-architect

      - uses: actions/checkout@v4
        with:
          repository: cyborgbear33/software-architect
          path: software-architect

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LOGOS engine from a pinable tag
        run: |
          python -m pip install -U pip
          python -m pip install "logos[schema] @ git+https://github.com/cyborgbear33/metalanguage.git@logos-v0.1.0#subdirectory=engine"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: auto-architect/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Hard-fail ontology lint (well-formedness + narrow catalog/cartridge parity)
        run: pnpm lint:ontology
        env:
          LOGOS_PYTHON_BIN: python

      # Real-LOGOS smoke: exercises the actual `python3 -m logos realize|reason`
      # subprocess against the checked-in misfire fixtures, plus the schema
      # fail-fast path — catches @seam/logos-bridge <-> engine wire drift that
      # FakeLogosBridge-based unit tests cannot see. Sole CI job that runs these
      # for real (verify deliberately omits the logos install).
      - name: Real-LOGOS integration tests (logos-bridge)
        run: pnpm --filter @auto/logos-bridge test
        env:
          LOGOS_PYTHON_BIN: python
